name: Build, Push, Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sample-api

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          echo "IMAGE_NAME=ghcr.io/$owner/sample-api" >> $env:GITHUB_ENV
        shell: powershell

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} ./SampleApi
          docker build -t ${{ env.IMAGE_NAME }}:latest ./SampleApi

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy with Helm
        run: |
          helm upgrade --install sample-api-release ./sample-api-chart `
            --set image.repository=${{ env.IMAGE_NAME }} `
            --set image.tag=${{ github.sha }}
